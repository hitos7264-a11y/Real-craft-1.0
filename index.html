<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0c10">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VoxelWorld">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon.svg">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<title>VoxelWorld</title>
<style>
  :root{
    --bg:#0a0c10; --sun:#ffb454; --dim:#8b97a6; --ink:#e7ecf2;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    overscroll-behavior:none;touch-action:manipulation}
  body{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:calc(20px + var(--safe-t)) 24px calc(24px + var(--safe-b));overflow:hidden}
  .splash-logo{width:96px;height:96px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  h1{font-size:14px;letter-spacing:.28em;color:var(--sun);margin:0 0 8px;font-weight:700}
  .tag{font-size:11px;color:var(--dim);margin:0 0 28px;letter-spacing:.06em}
  .card{width:100%;max-width:360px}
  .play{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
    font-family:inherit;font-size:15px;font-weight:800;letter-spacing:.04em;
    padding:16px 0;border:none;border-radius:14px;cursor:pointer;
    background:linear-gradient(180deg,#ffcf80,#ff9e36);color:#1a1206;
    box-shadow:0 8px 32px rgba(255,158,54,.35);margin-bottom:12px}
  .play:active{transform:scale(.98)}
  .install{width:100%;font-family:inherit;font-size:13px;font-weight:700;padding:14px 0;
    border-radius:12px;border:1px solid var(--sun);background:rgba(255,180,84,.08);
    color:var(--sun);display:none;margin-bottom:12px}
  .ios-guide{display:none;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
    border-radius:12px;padding:14px 16px;font-size:12px;line-height:1.7;color:var(--dim);margin-bottom:12px}
  .ios-guide b{color:var(--ink)}
  .ios-guide.show{display:block}
  .feat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
  .feat span{font-size:10px;color:var(--dim);background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 10px;text-align:center}
  .standalone .install,.standalone .ios-guide{display:none!important}
  #boot-splash{position:fixed;inset:0;z-index:99;background:var(--bg);display:flex;flex-direction:column;
    align-items:center;justify-content:center;transition:opacity .4s}
  #boot-splash.hide{opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="boot-splash">
  <img class="splash-logo" src="icons/icon.svg" alt="" width="96" height="96">
  <h1>VOXEL WORLD</h1>
</div>
<div class="card">
  <img class="splash-logo" src="icons/icon.svg" alt="" width="96" height="96">
  <h1>HRGM VOXEL WORLD</h1>
  <p class="tag">WebGPU • スマホGPUフル活用</p>
  <button class="play" id="play">▶ &nbsp;タップしてプレイ</button>
  <button class="install" id="install">📲 アプリとしてインストール</button>
  <div class="ios-guide" id="ios">
    <b>iPhoneの場合</b><br>
    1. Safariでこのページを開く<br>
    2. 下の <b>共有</b> ボタンをタップ<br>
    3. <b>ホーム画面に追加</b> を選ぶ<br>
    → アイコンから起動すると本物のアプリ感で遊べます
  </div>
  <div class="feat">
    <span>全画面起動</span><span>オフライン対応</span>
    <span>GPUレイトレース</span><span>タッチ操作</span>
  </div>
</div>
<script src="native.js"></script>
<script>
HRGMNative.applyStandaloneClass();
HRGMNative.preventBrowserGestures();
HRGMNative.registerServiceWorker();

const play=document.getElementById("play");
const installBtn=document.getElementById("install");
const ios=document.getElementById("ios");
let deferred;

// インストール済みなら即ゲームへ（アプリアイコンから来た場合）
if(HRGMNative.isStandalone){
  location.replace("hrgm_voxel_world.html?source=app");
}else{
  setTimeout(()=>document.getElementById("boot-splash").classList.add("hide"),600);
}

// iOS Safari 判定
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
if(isIOS&&!HRGMNative.isStandalone) ios.classList.add("show");

play.onclick=()=>{
  HRGMNative.haptic(12);
  location.href="hrgm_voxel_world.html?source=launcher";
};

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferred=e;
  installBtn.style.display="block";
});

installBtn.onclick=async()=>{
  if(!deferred) return;
  HRGMNative.haptic(16);
  deferred.prompt();
  const {outcome}=await deferred.userChoice;
  deferred=null;
  if(outcome==="accepted") installBtn.style.display="none";
};

window.addEventListener("appinstalled",()=>{
  installBtn.style.display="none";
  HRGMNative.haptic([20,40,20]);
});
</script>
</body>
</html>
